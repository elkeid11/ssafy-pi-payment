<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSAFY</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body{
      font-family:Arial,sans-serif;
      text-align:center;
      padding:60px 20px;
      background:#fafafa;
      color:#111;
    }
    h1{
      font-size:46px;
      margin-bottom:18px;
    }
    p{
      font-size:19px;
      color:#555;
      max-width:760px;
      margin:0 auto 34px;
    }
    .card{
      max-width:760px;
      margin:0 auto;
      background:#fff;
      border-radius:16px;
      padding:28px;
      box-shadow:0 8px 24px rgba(0,0,0,.08);
    }
    button{
      font-size:22px;
      padding:16px 36px;
      border:0;
      border-radius:12px;
      background:#6d28d9;
      color:#fff;
      cursor:pointer;
    }
    button:disabled{
      background:#aaa;
      cursor:not-allowed;
    }
    #status{
      margin:26px auto 0;
      padding:18px;
      max-width:720px;
      background:#f1f1f1;
      border-radius:12px;
      font-size:16px;
      white-space:pre-wrap;
      text-align:left;
      word-break:break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SSAFY</h1>
    <p>A Pi utility app for community learning, project sharing, and AI automation tools for Pioneers.</p>
    <button id="payBtn" disabled>Test Pi Payment</button>
    <div id="status">Loading Pi SDK...</div>
  </div>

  <script>
    const statusBox = document.getElementById('status');
    const payBtn = document.getElementById('payBtn');

    function setStatus(message) {
      statusBox.textContent = message;
      console.log(message);
    }

    async function postJson(url, payload) {
      const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      let data;

      try {
        data = JSON.parse(text);
      } catch (_) {
        data = { raw: text };
      }

      if (!res.ok) {
        throw new Error(JSON.stringify(data));
      }

      return data;
    }

    function onIncompletePaymentFound(payment) {
      setStatus('Incomplete payment found:\n' + JSON.stringify(payment, null, 2));
    }

    window.addEventListener('load', function () {
      try {
        if (!window.Pi) {
          setStatus('Error: Pi SDK not loaded. Open this page inside Pi Browser.');
          return;
        }

        Pi.init({
          version: '2.0',
          sandbox: true
        });

        setStatus('Pi SDK initialized. Ready to test payment.');
        payBtn.disabled = false;
      } catch (err) {
        setStatus('Pi init error:\n' + (err.message || String(err)));
      }
    });

    payBtn.addEventListener('click', async function () {
      payBtn.disabled = true;

      try {
        setStatus('Authenticating with username and payments scope...');

        await Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);

        setStatus('Authentication complete.\nCreating test payment...');

        const paymentData = {
          amount: 0.01,
          memo: 'SSAFY test payment',
          metadata: {
            app: 'SSAFY',
            type: 'test'
          }
        };

        const callbacks = {
          onReadyForServerApproval: async function (paymentId) {
            try {
              setStatus(
                'Payment ID received:\n' +
                paymentId +
                '\n\nApproving payment on server...'
              );

              const result = await postJson('/api/approve-payment', { paymentId });

              setStatus(
                'Payment approved on server.\n' +
                'Approve it in Pi Wallet.\n\n' +
                JSON.stringify(result, null, 2)
              );
            } catch (err) {
              setStatus('Server approval error:\n' + (err.message || String(err)));
              payBtn.disabled = false;
            }
          },

          onReadyForServerCompletion: async function (paymentId, txid) {
            try {
              setStatus(
                'TxID received:\n' +
                txid +
                '\n\nCompleting payment on server...'
              );

              const result = await postJson('/api/complete-payment', {
                paymentId,
                txid
              });

              setStatus(
                'Payment completed.\n\n' +
                JSON.stringify(result, null, 2)
              );

              payBtn.disabled = false;
            } catch (err) {
              setStatus('Server completion error:\n' + (err.message || String(err)));
              payBtn.disabled = false;
            }
          },

          onCancel: function (paymentId) {
            setStatus('Payment cancelled.\nPayment ID: ' + paymentId);
            payBtn.disabled = false;
          },

          onError: function (error, payment) {
            setStatus(
              'Payment error:\n' +
              (error && error.message ? error.message : JSON.stringify(error)) +
              '\n\nPayment:\n' +
              JSON.stringify(payment, null, 2)
            );
            payBtn.disabled = false;
          }
        };

        Pi.createPayment(paymentData, callbacks);
      } catch (err) {
        setStatus('Error:\n' + (err.message || String(err)));
        payBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
